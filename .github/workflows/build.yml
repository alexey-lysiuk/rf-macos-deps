---
name: Build Targets

on:
  push:
    paths-ignore:
      - '**.md'
      - '.gitignore'
  pull_request:
    paths-ignore:
      - '**.md'
      - '.gitignore'

jobs:
  build:
    if: "!contains(github.event.head_commit.message, '[skip build]')"
    name: ${{ matrix.target }}
    runs-on: macos-13
    strategy:
      fail-fast: false
      matrix:
        target:
#          - sdrpp
          - mmsdr

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Generate Xcode project
        run: |
          # temp hack start
          mkdir source
          cd source
          git clone https://github.com/alexey-lysiuk/mmSDR.git mmsdr
          git -C mmsdr switch wip
          cd ..
          # temp hack end
          ./build.py --target ${{ matrix.target }} --xcode

      - name: Build target
        run: |
          ./build.py --target ${{ matrix.target }}

      - name: List Build Directory
        if: always()
        shell: bash
        run: |
          git status
          ls -lR .
...
